<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>FileVault</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0c0c0c;
      --surface:   #161616;
      --surface2:  #1f1f1f;
      --border:    #2a2a2a;
      --border2:   #3a3a3a;
      --accent:    #e8c547;
      --text:      #f0ede6;
      --muted:     #6b6b6b;
      --danger:    #e05555;
      --danger-dim:#8b2a2a;
      --success:   #3eb87a;
      --radius:    6px;
      --font-ui:   'Syne', sans-serif;
      --font-mono: 'DM Mono', monospace;
    }

    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font-ui); font-size: 14px; -webkit-font-smoothing: antialiased; }

    /* LOCK */
    #lock-screen { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; background: var(--bg); z-index: 1000; transition: opacity 0.3s ease; }
    #lock-screen.hidden { opacity: 0; pointer-events: none; }
    .lock-card { width: min(340px, 90vw); padding: 40px 36px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); }
    .lock-logo { font-size: 22px; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 6px; }
    .lock-logo span { color: var(--accent); }
    .lock-sub { font-family: var(--font-mono); font-size: 11px; color: var(--muted); margin-bottom: 32px; letter-spacing: 0.03em; }
    .lock-label { font-family: var(--font-mono); font-size: 10px; color: var(--muted); letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 8px; display: block; }
    .lock-input { width: 100%; padding: 11px 14px; background: var(--bg); border: 1px solid var(--border2); border-radius: var(--radius); color: var(--text); font-family: var(--font-mono); font-size: 14px; outline: none; transition: border-color 0.15s; margin-bottom: 16px; }
    .lock-input:focus { border-color: var(--accent); }
    .lock-input.error { border-color: var(--danger); }
    .lock-btn { width: 100%; padding: 11px; background: var(--accent); color: #0c0c0c; border: none; border-radius: var(--radius); font-family: var(--font-ui); font-size: 14px; font-weight: 700; cursor: pointer; transition: background 0.15s, transform 0.1s; }
    .lock-btn:hover { background: #f5d55e; }
    .lock-btn:active { transform: scale(0.98); }
    .lock-btn:disabled { background: var(--border2); color: var(--muted); cursor: not-allowed; }
    .lock-error { font-family: var(--font-mono); font-size: 11px; color: var(--danger); margin-top: 10px; text-align: center; min-height: 16px; }

    /* APP */
    #app { display: none; flex-direction: column; min-height: 100vh; }
    #app.visible { display: flex; }

    /* TOPBAR */
    .topbar { display: flex; align-items: center; justify-content: space-between; padding: 0 24px; height: 56px; background: var(--surface); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
    .topbar-logo { font-size: 18px; font-weight: 800; letter-spacing: -0.4px; }
    .topbar-logo span { color: var(--accent); }
    .topbar-nav { display: flex; gap: 2px; }
    .tab-btn { padding: 6px 18px; background: none; border: 1px solid transparent; border-radius: var(--radius); color: var(--muted); font-family: var(--font-ui); font-size: 13px; font-weight: 600; cursor: pointer; transition: color 0.15s, border-color 0.15s, background 0.15s; }
    .tab-btn:hover { color: var(--text); }
    .tab-btn.active { color: var(--accent); border-color: var(--border2); background: var(--surface2); }
    .logout-btn { background: none; border: none; color: var(--muted); font-family: var(--font-mono); font-size: 11px; cursor: pointer; padding: 4px 8px; border-radius: 4px; transition: color 0.15s; }
    .logout-btn:hover { color: var(--danger); }

    /* CONTENT */
    .content { flex: 1; padding: 28px 24px; max-width: 1200px; width: 100%; margin: 0 auto; }

    /* UPLOAD */
    .upload-section { margin-bottom: 32px; }
    .section-label { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted); margin-bottom: 12px; }
    .drop-zone { border: 1.5px dashed var(--border2); border-radius: var(--radius); padding: 32px 24px; text-align: center; cursor: pointer; transition: border-color 0.15s, background 0.15s; position: relative; }
    .drop-zone:hover, .drop-zone.drag-over { border-color: var(--accent); background: rgba(232,197,71,0.04); }
    .drop-zone input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
    .drop-icon { font-size: 28px; margin-bottom: 10px; display: block; }
    .drop-text { font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
    .drop-hint { font-family: var(--font-mono); font-size: 11px; color: var(--muted); }

    /* QUEUE */
    .queue-section { margin-top: 14px; display: none; }
    .queue-section.visible { display: block; }
    .queue-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
    .queue-label { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); }
    .queue-actions { display: flex; gap: 8px; }
    .queue-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; max-height: 280px; overflow-y: auto; }
    .queue-item { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); padding: 10px 12px; display: flex; align-items: center; gap: 10px; }
    .queue-item-icon { font-size: 18px; flex-shrink: 0; }
    .queue-item-info { flex: 1; min-width: 0; }
    .queue-item-name { font-size: 12px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--text); }
    .queue-item-size { font-family: var(--font-mono); font-size: 10px; color: var(--muted); margin-top: 2px; }
    .queue-item-bar { height: 2px; background: var(--border); border-radius: 1px; margin-top: 6px; overflow: hidden; display: none; }
    .queue-item-bar.visible { display: block; }
    .queue-item-bar-fill { height: 100%; background: var(--accent); border-radius: 1px; width: 0%; transition: width 0.15s; }
    .queue-item-status { font-family: var(--font-mono); font-size: 10px; flex-shrink: 0; padding: 2px 8px; border-radius: 3px; }
    .queue-item-status.waiting   { color: var(--muted); }
    .queue-item-status.uploading { color: var(--accent); background: rgba(232,197,71,0.1); }
    .queue-item-status.done      { color: var(--success); }
    .queue-item-status.error     { color: var(--danger); }
    .queue-remove-btn { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 14px; padding: 2px 4px; flex-shrink: 0; transition: color 0.1s; }
    .queue-remove-btn:hover { color: var(--danger); }

    /* BUTTONS */
    .btn { padding: 8px 20px; border: none; border-radius: var(--radius); font-family: var(--font-ui); font-size: 13px; font-weight: 700; cursor: pointer; transition: background 0.15s, opacity 0.15s, transform 0.1s; white-space: nowrap; letter-spacing: 0.02em; }
    .btn:active { transform: scale(0.97); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
    .btn-primary { background: var(--accent); color: #0c0c0c; }
    .btn-primary:hover:not(:disabled) { background: #f5d55e; }
    .btn-ghost { background: var(--surface2); color: var(--text); border: 1px solid var(--border2); }
    .btn-ghost:hover:not(:disabled) { background: #2a2a2a; }
    .btn-danger { background: var(--danger-dim); color: #ffb3b3; }
    .btn-danger:hover:not(:disabled) { background: var(--danger); color: #fff; }
    .btn-sm { padding: 5px 12px; font-size: 11px; }

    /* TOAST */
    .toast-container { position: fixed; bottom: 24px; right: 24px; display: flex; flex-direction: column; gap: 8px; z-index: 9999; }
    .toast { padding: 10px 16px; background: var(--surface2); border: 1px solid var(--border2); border-radius: var(--radius); font-family: var(--font-mono); font-size: 12px; color: var(--text); animation: slideIn 0.2s ease; max-width: 280px; }
    .toast.success { border-left: 3px solid var(--success); }
    .toast.error   { border-left: 3px solid var(--danger); }
    @keyframes slideIn { from { opacity:0; transform:translateX(20px); } to { opacity:1; transform:translateX(0); } }

    /* FILE GRID */
    .divider { height: 1px; background: var(--border); margin: 28px 0; }
    .files-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
    .files-count { font-family: var(--font-mono); font-size: 11px; color: var(--muted); }
    .file-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 14px; }

    /* FILE CARD */
    .file-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; transition: border-color 0.15s, transform 0.15s; display: flex; flex-direction: column; }
    .file-card:hover { border-color: var(--border2); transform: translateY(-1px); }
    .file-thumb { width: 100%; aspect-ratio: 16/10; background: var(--surface2); display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; }
    .file-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .file-thumb .thumb-icon { font-size: 30px; opacity: 0.6; }
    .file-thumb .type-badge { position: absolute; top: 8px; right: 8px; font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.08em; text-transform: uppercase; background: rgba(0,0,0,0.7); color: var(--muted); padding: 2px 6px; border-radius: 3px; }
    .file-info { padding: 12px 14px; flex: 1; display: flex; flex-direction: column; gap: 6px; }
    .file-name { font-size: 13px; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .file-meta { font-family: var(--font-mono); font-size: 10px; color: var(--muted); display: flex; gap: 10px; }
    .file-actions { padding: 10px 14px; border-top: 1px solid var(--border); display: flex; gap: 6px; flex-wrap: wrap; }

    /* EMPTY / LOADING */
    .empty-state { text-align: center; padding: 64px 24px; color: var(--muted); }
    .empty-icon { font-size: 40px; margin-bottom: 14px; display: block; opacity: 0.4; }
    .empty-title { font-size: 15px; font-weight: 600; color: var(--text); margin-bottom: 6px; }
    .empty-sub { font-family: var(--font-mono); font-size: 11px; }
    .loading-state { text-align: center; padding: 64px; color: var(--muted); }
    .spinner { width: 24px; height: 24px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* MODAL */
    .modal-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 500; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
    .modal-backdrop.open { opacity: 1; pointer-events: all; }
    .modal { background: var(--surface); border: 1px solid var(--border2); border-radius: var(--radius); padding: 28px; width: min(400px,90vw); transform: scale(0.95); transition: transform 0.2s; }
    .modal-backdrop.open .modal { transform: scale(1); }
    .modal-title { font-size: 16px; font-weight: 700; margin-bottom: 10px; }
    .modal-body { font-family: var(--font-mono); font-size: 12px; color: var(--muted); line-height: 1.6; margin-bottom: 22px; }
    .modal-actions { display: flex; gap: 10px; justify-content: flex-end; }

    /* RESPONSIVE */
    @media (max-width: 600px) {
      .topbar { padding: 0 16px; }
      .content { padding: 20px 16px; }
      .file-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 10px; }
      .topbar-logo { font-size: 15px; }
      .tab-btn { padding: 5px 12px; font-size: 12px; }
      .toast-container { bottom: 16px; right: 16px; left: 16px; }
      .toast { max-width: 100%; }
      .drop-zone { padding: 24px 16px; }
    }

    .tab-panel { display: none; }
    .tab-panel.active { display: block; }
  </style>
</head>
<body>

<div id="lock-screen">
  <div class="lock-card">
    <div class="lock-logo">File<span>Vault</span></div>
    <div class="lock-sub">PRIVATE FILE STORAGE</div>
    <label class="lock-label" for="password-input">Access Password</label>
    <input type="password" id="password-input" class="lock-input" placeholder="Enter password" autocomplete="current-password">
    <button class="lock-btn" id="unlock-btn">Unlock</button>
    <div class="lock-error" id="lock-error"></div>
  </div>
</div>

<div id="app">
  <header class="topbar">
    <div class="topbar-logo">File<span>Vault</span></div>
    <nav class="topbar-nav">
      <button class="tab-btn active" data-tab="main">Uploads</button>
      <button class="tab-btn" data-tab="archive">Archive</button>
    </nav>
    <button class="logout-btn" id="logout-btn">LOCK</button>
  </header>

  <main class="content">

    <div class="tab-panel active" id="panel-main">
      <div class="upload-section">
        <div class="section-label">Upload Files</div>
        <div class="drop-zone" id="drop-zone">
          <input type="file" id="file-input" multiple>
          <span class="drop-icon">📁</span>
          <div class="drop-text">Drop files here or tap to select</div>
          <div class="drop-hint">Any file type · Select multiple · Max 100MB each</div>
        </div>

        <div class="queue-section" id="queue-section">
          <div class="queue-header">
            <span class="queue-label" id="queue-label">0 files selected</span>
            <div class="queue-actions">
              <button class="btn btn-ghost btn-sm" id="clear-queue-btn">✕ Clear</button>
              <button class="btn btn-primary btn-sm" id="upload-all-btn">↑ Upload All</button>
            </div>
          </div>
          <div class="queue-list" id="queue-list"></div>
        </div>
      </div>

      <div class="divider"></div>

      <div class="files-header">
        <div class="section-label" style="margin:0;">Recent Uploads</div>
        <span class="files-count" id="main-count"></span>
      </div>
      <div id="main-files-container">
        <div class="loading-state"><div class="spinner"></div>Loading files…</div>
      </div>
    </div>

    <div class="tab-panel" id="panel-archive">
      <div class="files-header">
        <div class="section-label" style="margin:0;">Archive</div>
        <span class="files-count" id="archive-count"></span>
      </div>
      <div id="archive-files-container">
        <div class="loading-state"><div class="spinner"></div>Loading archive…</div>
      </div>
    </div>

  </main>
</div>

<div class="modal-backdrop" id="confirm-modal">
  <div class="modal">
    <div class="modal-title" id="modal-title">Confirm</div>
    <div class="modal-body" id="modal-body">Are you sure?</div>
    <div class="modal-actions">
      <button class="btn btn-ghost btn-sm" id="modal-cancel">Cancel</button>
      <button class="btn btn-danger btn-sm" id="modal-confirm">Confirm</button>
    </div>
  </div>
</div>

<div class="toast-container" id="toast-container"></div>

<script>
  const WORKER_URL = 'https://filevault-worker.nikolaglavinic2003.workers.dev'; // ← CHANGE THIS

  /* ── STATE ── */
  let queue = [];
  let uploading = false;
  let mainFiles = [], archiveFiles = [];
  let thumbnailCache = {};
  let pendingConfirm = null;
  let archiveLoaded = false;

  /* ── UTILS ── */
  const getToken = () => sessionStorage.getItem('fv_token');
  const setToken = t => sessionStorage.setItem('fv_token', t);
  const clearToken = () => sessionStorage.removeItem('fv_token');

  function formatSize(b) {
    if (b < 1024) return b + ' B';
    if (b < 1048576) return (b/1024).toFixed(1) + ' KB';
    return (b/1048576).toFixed(1) + ' MB';
  }

  function formatDate(iso) {
    if (!iso) return '—';
    return new Date(iso).toLocaleDateString('en-GB', {day:'2-digit',month:'short',year:'numeric'});
  }

  function fileExt(name) { return (name.split('.').pop() || '').toUpperCase(); }

  function fileIcon(name, ct) {
    const e = (name.split('.').pop() || '').toLowerCase();
    if (ct && ct.startsWith('image/')) return '🖼️';
    if (ct && ct.startsWith('video/')) return '🎬';
    if (ct && ct.startsWith('audio/')) return '🎵';
    if (['zip','rar','7z','tar','gz','bz2'].includes(e)) return '🗜️';
    if (e === 'pdf') return '📄';
    if (['exe','msi','dmg','deb','apk','ipa'].includes(e)) return '⚙️';
    if (['doc','docx','odt','rtf'].includes(e)) return '📝';
    if (['xls','xlsx','csv','ods'].includes(e)) return '📊';
    if (['ppt','pptx','odp'].includes(e)) return '📊';
    if (['mp3','wav','flac','aac','ogg','m4a'].includes(e)) return '🎵';
    return '📦';
  }

  function toast(msg, type = 'success') {
    const el = document.createElement('div');
    el.className = `toast ${type}`;
    el.textContent = msg;
    document.getElementById('toast-container').appendChild(el);
    setTimeout(() => el.remove(), 3500);
  }

  async function api(endpoint, opts = {}) {
    const res = await fetch(WORKER_URL + endpoint, {
      ...opts,
      headers: { ...(opts.headers || {}), 'Authorization': 'Bearer ' + getToken() }
    });
    if (res.status === 401) { logout(); throw new Error('Unauthorized'); }
    return res;
  }

  /* ── MODAL ── */
  function confirmDialog(title, body) {
    return new Promise(resolve => {
      document.getElementById('modal-title').textContent = title;
      document.getElementById('modal-body').textContent = body;
      document.getElementById('confirm-modal').classList.add('open');
      pendingConfirm = resolve;
    });
  }
  document.getElementById('modal-cancel').onclick = () => {
    document.getElementById('confirm-modal').classList.remove('open');
    if (pendingConfirm) { pendingConfirm(false); pendingConfirm = null; }
  };
  document.getElementById('modal-confirm').onclick = () => {
    document.getElementById('confirm-modal').classList.remove('open');
    if (pendingConfirm) { pendingConfirm(true); pendingConfirm = null; }
  };

  /* ── AUTH ── */
  async function tryUnlock() {
    const pw = document.getElementById('password-input').value.trim();
    const errEl = document.getElementById('lock-error');
    const btn = document.getElementById('unlock-btn');
    if (!pw) { errEl.textContent = 'Please enter a password.'; return; }
    btn.disabled = true; btn.textContent = 'Checking…'; errEl.textContent = '';
    try {
      const res = await fetch(WORKER_URL + '/auth', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ password: pw })
      });
      if (res.ok) {
        setToken(pw);
        document.getElementById('lock-screen').classList.add('hidden');
        setTimeout(() => {
          document.getElementById('lock-screen').style.display = 'none';
          document.getElementById('app').classList.add('visible');
          loadMainFiles();
        }, 320);
      } else {
        document.getElementById('password-input').classList.add('error');
        errEl.textContent = 'Incorrect password. Try again.';
      }
    } catch { errEl.textContent = 'Could not reach server. Check WORKER_URL.'; }
    btn.disabled = false; btn.textContent = 'Unlock';
  }

  function logout() { clearToken(); location.reload(); }

  if (getToken()) {
    document.getElementById('lock-screen').style.display = 'none';
    document.getElementById('app').classList.add('visible');
    loadMainFiles();
  }

  document.getElementById('unlock-btn').onclick = tryUnlock;
  document.getElementById('password-input').addEventListener('keydown', e => { if (e.key === 'Enter') tryUnlock(); });
  document.getElementById('logout-btn').onclick = logout;

  /* ── TABS ── */
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.onclick = () => {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('panel-' + btn.dataset.tab).classList.add('active');
      if (btn.dataset.tab === 'archive' && !archiveLoaded) { archiveLoaded = true; loadArchiveFiles(); }
    };
  });

  /* ── QUEUE ── */
  const dropZone     = document.getElementById('drop-zone');
  const fileInput    = document.getElementById('file-input');
  const queueSection = document.getElementById('queue-section');
  const queueList    = document.getElementById('queue-list');
  const queueLabel   = document.getElementById('queue-label');

  function addFilesToQueue(files) {
    for (const file of files) {
      const id = Math.random().toString(36).slice(2);
      const item = { file, id, status: 'waiting' };

      const el = document.createElement('div');
      el.className = 'queue-item';
      el.innerHTML = `
        <span class="queue-item-icon">${fileIcon(file.name, file.type)}</span>
        <div class="queue-item-info">
          <div class="queue-item-name" title="${file.name}">${file.name}</div>
          <div class="queue-item-size">${formatSize(file.size)}</div>
          <div class="queue-item-bar" id="bar-${id}"><div class="queue-item-bar-fill" id="fill-${id}"></div></div>
        </div>
        <span class="queue-item-status waiting" id="status-${id}">waiting</span>
        <button class="queue-remove-btn" title="Remove">✕</button>
      `;
      el.querySelector('.queue-remove-btn').onclick = () => removeFromQueue(id);

      item.el       = el;
      queue.push(item);
      queueList.appendChild(el);

      item.barEl    = el.querySelector(`#bar-${id}`);
      item.fillEl   = el.querySelector(`#fill-${id}`);
      item.statusEl = el.querySelector(`#status-${id}`);
    }
    refreshQueueUI();
  }

  function removeFromQueue(id) {
    const idx = queue.findIndex(i => i.id === id);
    if (idx === -1 || queue[idx].status === 'uploading') return;
    queue[idx].el.remove();
    queue.splice(idx, 1);
    refreshQueueUI();
  }

  function clearQueue() {
    queue.filter(i => i.status !== 'uploading').forEach(i => i.el.remove());
    queue = queue.filter(i => i.status === 'uploading');
    refreshQueueUI();
  }

  function refreshQueueUI() {
    const n = queue.length;
    queueLabel.textContent = n === 0 ? '0 files selected' : `${n} file${n !== 1 ? 's' : ''} selected`;
    queueSection.classList.toggle('visible', n > 0);
    fileInput.value = '';
  }

  fileInput.onchange = () => { if (fileInput.files.length) addFilesToQueue(Array.from(fileInput.files)); };
  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault(); dropZone.classList.remove('drag-over');
    if (e.dataTransfer.files.length) addFilesToQueue(Array.from(e.dataTransfer.files));
  });

  document.getElementById('clear-queue-btn').onclick = clearQueue;

  /* ── UPLOAD ── */
  document.getElementById('upload-all-btn').onclick = startUploadQueue;

  async function startUploadQueue() {
    if (uploading) return;
    const pending = queue.filter(i => i.status === 'waiting');
    if (!pending.length) { toast('No files to upload.', 'error'); return; }

    uploading = true;
    document.getElementById('upload-all-btn').disabled = true;
    document.getElementById('clear-queue-btn').disabled = true;

    let ok = 0, fail = 0;
    for (const item of pending) {
      await uploadItem(item).then(() => ok++).catch(() => fail++);
    }

    uploading = false;
    document.getElementById('upload-all-btn').disabled = false;
    document.getElementById('clear-queue-btn').disabled = false;

    if (ok > 0) {
      toast(`${ok} file${ok !== 1 ? 's' : ''} uploaded.`);
      loadMainFiles();
      queue.filter(i => i.status === 'done').forEach(i => { setTimeout(() => i.el.remove(), 800); });
      setTimeout(() => { queue = queue.filter(i => i.status !== 'done'); refreshQueueUI(); }, 900);
    }
    if (fail > 0) toast(`${fail} file${fail !== 1 ? 's' : ''} failed.`, 'error');
  }

  function uploadItem(item) {
    return new Promise((resolve, reject) => {
      item.status = 'uploading';
      item.statusEl.className = 'queue-item-status uploading';
      item.statusEl.textContent = '0%';
      item.barEl.classList.add('visible');

      const fd = new FormData();
      fd.append('file', item.file);

      const xhr = new XMLHttpRequest();
      xhr.open('POST', WORKER_URL + '/upload');
      xhr.setRequestHeader('Authorization', 'Bearer ' + getToken());

      xhr.upload.onprogress = e => {
        if (e.lengthComputable) {
          const pct = Math.round(e.loaded / e.total * 100);
          item.fillEl.style.width = pct + '%';
          item.statusEl.textContent = pct + '%';
        }
      };
      xhr.onload = () => {
        if (xhr.status === 200 || xhr.status === 201) {
          item.status = 'done';
          item.statusEl.className = 'queue-item-status done';
          item.statusEl.textContent = '✓ done';
          item.fillEl.style.width = '100%';
          resolve();
        } else if (xhr.status === 401) {
          logout(); reject();
        } else {
          item.status = 'error';
          item.statusEl.className = 'queue-item-status error';
          item.statusEl.textContent = 'failed';
          reject();
        }
      };
      xhr.onerror = () => {
        item.status = 'error';
        item.statusEl.className = 'queue-item-status error';
        item.statusEl.textContent = 'failed';
        reject();
      };
      xhr.send(fd);
    });
  }

  /* ── THUMBNAILS ── */
  const thumbObserver = new IntersectionObserver(async entries => {
    for (const entry of entries) {
      if (!entry.isIntersecting) continue;
      const el = entry.target;
      const { key, ct, name } = el.dataset;
      if (ct && ct.startsWith('video/')) {
        el.innerHTML = '<span class="thumb-icon">🎬</span>';
      } else if (ct && ct.startsWith('image/')) {
        el.innerHTML = '<div class="spinner" style="width:16px;height:16px;border-width:2px;"></div>';
        try {
          if (!thumbnailCache[key]) {
            const res = await api('/file/' + encodeURIComponent(key));
            if (res.ok) thumbnailCache[key] = URL.createObjectURL(await res.blob());
          }
          el.innerHTML = thumbnailCache[key] ? `<img src="${thumbnailCache[key]}" alt="" loading="lazy">` : '<span class="thumb-icon">🖼️</span>';
        } catch { el.innerHTML = '<span class="thumb-icon">🖼️</span>'; }
      } else {
        el.innerHTML = `<span class="thumb-icon">${fileIcon(name || '', ct || '')}</span>`;
      }
      thumbObserver.unobserve(el);
    }
  }, { rootMargin: '100px' });

  /* ── RENDER ── */
  function renderFileCard(file, isArchive = false) {
    const card = document.createElement('div');
    card.className = 'file-card';

    const thumbEl = document.createElement('div');
    thumbEl.className = 'file-thumb';
    thumbEl.dataset.key  = file.key;
    thumbEl.dataset.ct   = file.contentType;
    thumbEl.dataset.name = file.name;
    thumbEl.innerHTML = '<div class="spinner" style="width:16px;height:16px;border-width:2px;"></div>';
    const badge = document.createElement('span');
    badge.className = 'type-badge';
    badge.textContent = fileExt(file.name);
    thumbEl.appendChild(badge);

    const infoEl = document.createElement('div');
    infoEl.className = 'file-info';
    infoEl.innerHTML = `
      <div class="file-name" title="${file.name}">${file.name}</div>
      <div class="file-meta"><span>${formatSize(file.size)}</span><span>${formatDate(file.uploadedAt)}</span></div>`;

    const actionsEl = document.createElement('div');
    actionsEl.className = 'file-actions';

    if (!isArchive) {
      const archBtn = document.createElement('button');
      archBtn.className = 'btn btn-ghost btn-sm';
      archBtn.textContent = '↓ Archive';
      archBtn.onclick = () => moveToArchive(file, card);
      actionsEl.appendChild(archBtn);
    }

    const dlBtn = document.createElement('button');
    dlBtn.className = 'btn btn-ghost btn-sm';
    dlBtn.textContent = '⬇ Save';
    dlBtn.onclick = () => downloadFile(file);
    actionsEl.appendChild(dlBtn);

    const delBtn = document.createElement('button');
    delBtn.className = 'btn btn-danger btn-sm';
    delBtn.textContent = '✕';
    delBtn.onclick = () => deleteFile(file, card, isArchive);
    actionsEl.appendChild(delBtn);

    card.appendChild(thumbEl);
    card.appendChild(infoEl);
    card.appendChild(actionsEl);
    thumbObserver.observe(thumbEl);
    return card;
  }

  function renderFiles(files, containerId, isArchive, countId) {
    const container = document.getElementById(containerId);
    const countEl   = document.getElementById(countId);
    container.innerHTML = '';
    countEl.textContent = files.length + ' file' + (files.length !== 1 ? 's' : '');
    if (!files.length) {
      container.innerHTML = `<div class="empty-state"><span class="empty-icon">${isArchive?'🗄️':'📂'}</span><div class="empty-title">${isArchive?'Archive is empty':'No uploads yet'}</div><div class="empty-sub">${isArchive?'Archived files will appear here.':'Upload your first file above.'}</div></div>`;
      return;
    }
    const grid = document.createElement('div');
    grid.className = 'file-grid';
    files.forEach(f => grid.appendChild(renderFileCard(f, isArchive)));
    container.appendChild(grid);
  }

  /* ── LOAD ── */
  async function loadMainFiles() {
    try {
      const res = await api('/files?category=main');
      const data = await res.json();
      mainFiles = (data.files||[]).sort((a,b) => new Date(b.uploadedAt)-new Date(a.uploadedAt));
      renderFiles(mainFiles, 'main-files-container', false, 'main-count');
    } catch {
      document.getElementById('main-files-container').innerHTML = '<div class="empty-state"><span class="empty-icon">⚠️</span><div class="empty-title">Failed to load files</div><div class="empty-sub">Check worker URL and connection.</div></div>';
    }
  }

  async function loadArchiveFiles() {
    try {
      const res = await api('/files?category=archive');
      const data = await res.json();
      archiveFiles = (data.files||[]).sort((a,b) => new Date(b.uploadedAt)-new Date(a.uploadedAt));
      renderFiles(archiveFiles, 'archive-files-container', true, 'archive-count');
    } catch {
      document.getElementById('archive-files-container').innerHTML = '<div class="empty-state"><span class="empty-icon">⚠️</span><div class="empty-title">Failed to load archive</div></div>';
    }
  }

  /* ── ACTIONS ── */
  async function downloadFile(file) {
    try {
      const res = await api('/file/' + encodeURIComponent(file.key) + '?download=1');
      if (!res.ok) { toast('Download failed.', 'error'); return; }
      const url = URL.createObjectURL(await res.blob());
      const a = document.createElement('a');
      a.href = url; a.download = file.name; a.click();
      URL.revokeObjectURL(url);
    } catch { toast('Download failed.', 'error'); }
  }

  async function deleteFile(file, cardEl, isArchive) {
    const ok = await confirmDialog('Delete File', `Delete "${file.name}"? This cannot be undone.`);
    if (!ok) return;
    try {
      const res = await api('/delete', { method:'DELETE', headers:{'Content-Type':'application/json'}, body: JSON.stringify({key: file.key}) });
      if (res.ok) {
        cardEl.style.cssText = 'opacity:0;transform:scale(0.95);transition:all 0.2s;';
        setTimeout(() => {
          cardEl.remove();
          if (isArchive) { archiveFiles = archiveFiles.filter(f=>f.key!==file.key); document.getElementById('archive-count').textContent = archiveFiles.length + ' file' + (archiveFiles.length!==1?'s':''); }
          else { mainFiles = mainFiles.filter(f=>f.key!==file.key); document.getElementById('main-count').textContent = mainFiles.length + ' file' + (mainFiles.length!==1?'s':''); }
        }, 200);
        toast('File deleted.');
      } else toast('Delete failed.', 'error');
    } catch { toast('Delete failed.', 'error'); }
  }

  async function moveToArchive(file, cardEl) {
    try {
      const res = await api('/archive', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({key: file.key}) });
      if (res.ok) {
        cardEl.style.cssText = 'opacity:0;transform:scale(0.95);transition:all 0.2s;';
        setTimeout(() => {
          cardEl.remove();
          mainFiles = mainFiles.filter(f=>f.key!==file.key);
          document.getElementById('main-count').textContent = mainFiles.length + ' file' + (mainFiles.length!==1?'s':'');
          archiveLoaded = false;
        }, 200);
        toast('Moved to Archive.');
      } else toast('Archive failed.', 'error');
    } catch { toast('Archive failed.', 'error'); }
  }
</script>
</body>
